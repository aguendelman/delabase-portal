    <!-- Main building -->
    <rect x="156" y="120" width="200" height="280" rx="8"/>
    <!-- Windows row 1 -->
    <rect x="180" y="150" width="40" height="30" rx="4" fill="#1E40AF"/>
    <rect x="236" y="150" width="40" height="30" rx="4" fill="#1E40AF"/>
    <rect x="292" y="150" width="40" height="30" rx="4" fill="#1E40AF"/>
    <!-- Windows row 2 -->
    <rect x="180" y="200" width="40" height="30" rx="4" fill="#1E40AF"/>
    <rect x="236" y="200" width="40" height="30" rx="4" fill="#1E40AF"/>
    <rect x="292" y="200" width="40" height="30" rx="4" fill="#1E40AF"/>
    <!-- Windows row 3 -->
    <rect x="180" y="250" width="40" height="30" rx="4" fill="#1E40AF"/>
    <rect x="236" y="250" width="40" height="30" rx="4" fill="#1E40AF"/>
    <rect x="292" y="250" width="40" height="30" rx="4" fill="#1E40AF"/>
    <!-- Door -->
    <rect x="226" y="320" width="60" height="80" rx="4" fill="#1E40AF"/>
